<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tweetxvault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #202327;
            --bg-tertiary: rgba(239, 243, 244, 0.1);
            --bg-header: rgba(0, 0, 0, 0.8);
            --text-primary: #e7e9ea;
            --text-secondary: #71767b;
            --border-color: #2f3336;
            --hover-bg: rgba(255, 255, 255, 0.03);
            --scrollbar-bg: #000000;
            --scrollbar-thumb: #3e4144;
            --scrollbar-thumb-hover: #55585b;
            --thread-line: #333639;
            --input-border: #2f3336;
            --white-icon: #ffffff;
            --dropdown-bg: #000000;
            --gray-700: #374151;
        }

        html.light {
            --bg-primary: #ffffff;
            --bg-secondary: #eff3f4;
            --bg-tertiary: rgba(15, 20, 25, 0.1);
            --bg-header: rgba(255, 255, 255, 0.85);
            --text-primary: #0f1419;
            --text-secondary: #536471;
            --border-color: #eff3f4;
            --hover-bg: rgba(0, 0, 0, 0.03);
            --scrollbar-bg: #ffffff;
            --scrollbar-thumb: #c1c8cd;
            --scrollbar-thumb-hover: #aab8c2;
            --thread-line: #cfd9de;
            --input-border: #cfd9de;
            --white-icon: #0f1419;
            --dropdown-bg: #ffffff;
            --gray-700: #536471;
        }

        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; transition: background-color 0.2s, color 0.2s; }
        .tweet-border { border-bottom: 1px solid var(--border-color); }
        .hover-bg:hover { background-color: var(--hover-bg); }
        .blue-hover:hover { color: #1d9bf0; }
        [x-cloak] { display: none !important; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        .roll-wrapper {
            position: relative;
            display: inline-block;
            height: 1.25em;
            overflow: hidden;
            vertical-align: bottom;
            cursor: pointer;
        }
        .roll-inner {
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .roll-wrapper:hover .roll-inner {
            transform: translateY(-50%);
        }
        .roll-item {
            height: 1.25em;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex justify-center">

    <div x-data="tweetApp()" x-init="initApp()" class="w-full max-w-[600px] border-x border-[var(--border-color)] min-h-screen relative bg-[var(--bg-primary)]">
        
        <!-- HEADER -->
        <div class="sticky top-0 z-20 bg-[var(--bg-header)] backdrop-blur-md p-4 border-b border-[var(--border-color)] flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <button x-show="viewMode === 'thread' || viewMode === 'quotes'" @click="goBack()" class="p-2 -ml-2 rounded-full hover-bg transition">
                    <svg viewBox="0 0 24 24" aria-hidden="true" class="w-5 h-5 fill-[var(--white-icon)]"><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"></path></svg>
                </button>
                <div class="flex flex-col">
                    <h1 class="text-xl font-bold text-[var(--text-primary)]" x-text="viewMode === 'list' ? 'Your Archive' : viewMode === 'quotes' ? 'Quote Tweets' : 'Post'"></h1>
                    <span x-show="viewMode === 'list' && lastSyncFormatted" class="text-[13px] text-[var(--text-secondary)]" x-text="lastSyncFormatted"></span>
                </div>
            </div>
            
            <div x-show="viewMode === 'list'" class="flex items-center space-x-2">
                <button @click="toggleTheme()" class="p-2 rounded-full hover-bg transition text-[var(--text-primary)]" aria-label="Toggle theme">
                    <svg x-show="darkMode" viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path fill-rule="evenodd" d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" clip-rule="evenodd" /></svg>
                    <svg x-show="!darkMode" viewBox="0 0 24 24" class="w-5 h-5 fill-current" x-cloak><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" /></svg>
                </button>
                <select x-model="sortOrder" @change="search()" class="bg-transparent text-[var(--text-primary)] font-bold text-sm outline-none cursor-pointer border border-[var(--border-color)] rounded-full px-3 py-1 hover-bg transition appearance-none">
                    <option value="default" class="text-black" x-show="searchQuery">Relevance</option>
                    <option value="newest" class="text-black">Latest</option>
                    <option value="oldest" class="text-black">Oldest</option>
                    <option value="random" class="text-black">Random</option>
                </select>
                <select x-model="collectionFilter" @change="search()" class="bg-transparent text-[var(--text-primary)] font-bold text-sm outline-none cursor-pointer border border-[var(--border-color)] rounded-full px-3 py-1 hover-bg transition appearance-none">
                    <option value="all" class="text-black">All Posts</option>
                    <option value="likes" class="text-black">Likes</option>
                    <option value="bookmarks" class="text-black">Bookmarks</option>
                    <option value="tweets" class="text-black">Your Tweets</option>
                </select>
            </div>
        </div>

        <!-- LIST VIEW -->
        <div x-show="viewMode === 'list'" class="pb-4">
            <!-- Count Header -->
            <div x-show="!loading" class="px-4 py-2 border-b border-[var(--border-color)] text-sm text-[var(--text-secondary)] font-bold">
                <span x-text="total.toLocaleString() + (searchQuery ? ' Results' : (collectionFilter === 'all' ? ' Posts' : ' ' + collectionFilter.charAt(0).toUpperCase() + collectionFilter.slice(1)))"></span>
            </div>

            <div class="p-4 border-b border-[var(--border-color)] relative" x-data="searchAutocomplete()" @click.away="showDropdown = false">
                <div class="relative w-full">
                    <input type="text" x-model="searchQuery" @input="handleInput" @focus="showDropdown = true; handleInput()" @keydown.enter="search(); showDropdown = false" @keydown.up.prevent="moveUp" @keydown.down.prevent="moveDown" @keydown.tab.prevent="selectOption" x-ref="searchInput" placeholder="Search..." class="w-full bg-[var(--bg-secondary)] text-[var(--text-primary)] rounded-full py-2 pl-4 pr-10 focus:outline-none focus:ring-1 focus:ring-[#1d9bf0] placeholder-gray-500 border border-[var(--input-border)]">
                    <button x-show="searchQuery" @click="searchQuery = ''; search()" class="absolute right-3 top-1/2 -translate-y-1/2 p-1 bg-[var(--text-secondary)] rounded-full hover:bg-[var(--text-primary)] transition">
                        <svg viewBox="0 0 24 24" class="w-3 h-3 fill-[var(--bg-primary)]"><path d="M13.414 12l5.793-5.793c.39-.39.39-1.023 0-1.414s-1.023-.39-1.414 0L12 10.586 6.207 4.793c-.39-.39-1.023-.39-1.414 0s-.39 1.023 0 1.414L10.586 12l-5.793 5.793c-.39.39-.39 1.023 0 1.414.195.195.45.293.707.293s.512-.098.707-.293L12 13.414l5.793 5.793c.195.195.45.293.707.293s.512-.098.707-.293c.39-.39.39-1.023 0-1.414L13.414 12z"></path></svg>
                    </button>
                </div>
                
                <div x-show="showDropdown && options.length > 0" x-transition.opacity.duration.100ms class="absolute top-full left-4 right-4 mt-1 bg-[var(--dropdown-bg)] border border-[var(--border-color)] rounded-xl shadow-[0_0_15px_rgba(255,255,255,0.1)] overflow-hidden z-50 py-2">
                    <template x-for="(opt, index) in options" :key="index">
                        <div @click="selectOptionIndex(index)" @mouseenter="selectedIndex = index" :class="{'bg-[var(--bg-tertiary)]': selectedIndex === index}" class="px-4 py-3 cursor-pointer flex transition justify-between items-center">
                            <template x-if="!opt.isTag">
                                <div class="flex flex-col justify-center">
                                    <div class="flex items-center space-x-2">
                                        <span class="text-[var(--text-primary)] font-bold" x-text="opt.prefix"></span>
                                        <span class="text-[var(--text-secondary)]" x-text="opt.value || opt.desc"></span>
                                    </div>
                                    <div class="text-[var(--text-secondary)] text-sm" x-show="opt.value" x-text="opt.desc"></div>
                                </div>
                            </template>
                            <template x-if="opt.isTag">
                                <div class="flex w-full justify-between items-center">
                                    <div class="flex items-center space-x-2">
                                        <span class="text-[var(--text-primary)] font-bold" x-text="opt.prefix"></span>
                                        <span class="text-[var(--text-primary)]" x-text="opt.value"></span>
                                    </div>
                                    <span class="text-[var(--text-secondary)] text-sm bg-[var(--bg-tertiary)] px-2 py-0.5 rounded-full font-medium" x-text="opt.count"></span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <template x-if="error">
                <div class="p-4 mx-4 my-2 bg-red-900/50 border border-red-500 rounded-lg text-red-200">
                    <div class="font-bold mb-1">Error Loading Tweets</div>
                    <div x-text="error"></div>
                    <button @click="error = null; fetchTweets()" class="mt-2 text-sm text-red-300 hover:text-red-100 underline">Try Again</button>
                </div>
            </template>

            <template x-if="loading && tweets.length === 0 && !error"><div class="p-8 text-center text-gray-500">Loading...</div></template>
            <template x-if="!loading && tweets.length === 0 && !error"><div class="p-8 text-center text-gray-500">No posts found in this collection.</div></template>

            <!-- TWEET LOOP -->
            <template x-for="tweetObj in tweets" :key="tweetObj.tweet_id">
                <div x-data="{ 
                    isRt: !!getRetweet(tweetObj), 
                    tweet: getRetweet(tweetObj) ? formatRetweetToTweet(tweetObj, getRetweet(tweetObj)) : tweetObj 
                }" class="px-4 pt-3 pb-2 tweet-border hover-bg transition duration-200 cursor-pointer" @click="openThread(tweet.tweet_id)">
                    
                    <template x-if="isRt">
                        <div class="text-[13px] text-[var(--text-secondary)] font-bold mb-1 flex items-center space-x-2 ml-8">
                            <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"></path></svg>
                            <span x-text="(tweetObj.author.display_name || 'Unknown') + ' Reposted'"></span>
                        </div>
                    </template>

                    <div class="flex space-x-3">
                        <div class="w-10 h-10 rounded-full flex-shrink-0 relative bg-[var(--gray-700)] flex items-center justify-center font-bold text-[var(--white-icon)] uppercase overflow-hidden" @click.stop="searchFrom(tweet.author.username)">
                            <span x-text="getInitial(tweet)"></span>
                            <img :src="'/api/avatar/' + (tweet.author.id || 'unknown')" @error="$el.style.display='none'" class="absolute inset-0 w-full h-full object-cover z-10" loading="lazy">
                        </div>

                        <div class="flex-1 min-w-0">
                            <div class="flex items-center space-x-1 text-[15px]">
                                <span class="font-bold text-[var(--text-primary)] truncate hover:underline" x-text="tweet.author.display_name || 'Unknown'" @click.stop="searchFrom(tweet.author.username)"></span>
                                <span class="text-[var(--text-secondary)] truncate" x-text="'@' + (tweet.author.username || 'unknown')"></span>
                                <span class="text-[var(--text-secondary)]">·</span>
                                <div class="roll-wrapper text-[var(--text-secondary)]" @click.stop>
                                    <div class="roll-inner">
                                        <span class="roll-item hover:underline" x-text="formatDate(tweet.created_at)"></span>
                                        <span class="roll-item text-[#1d9bf0] text-[13px] font-medium" x-text="formatSyncDate(tweet)"></span>
                                    </div>
                                </div>
                            </div>
                            
                            <template x-if="getReplyTo(tweet)">
                                <div class="text-[15px] text-[var(--text-secondary)] mb-1">
                                    Replying to <span class="text-[#1d9bf0] hover:underline cursor-pointer" @click.stop="searchFrom(getReplyTo(tweet))" x-text="'@' + getReplyTo(tweet)"></span>
                                </div>
                            </template>

                            <div class="text-[15px] mt-1 whitespace-pre-wrap leading-normal break-words" x-html="formatText(tweet)" @click="handleTextClick($event)"></div>
                            
                            <!-- Media -->
                            <div x-html="renderMediaGrid(tweet.media)" class="mt-3"></div>
                            
                            <!-- Card (Polls / Articles) -->
                            <div x-html="renderCard(tweet)" @click.stop></div>

                            <!-- Quote Tweet -->
                            <template x-if="getQuoteTweet(tweet)">
                                <div>
                                    <template x-if="isTombstone(getQuoteTweet(tweet))">
                                        <div class="mt-3 bg-[var(--bg-secondary)] rounded-xl p-4 text-[15px] text-[var(--text-secondary)]" x-text="getQuoteText(getQuoteTweet(tweet))"></div>
                                    </template>
                                    <template x-if="!isTombstone(getQuoteTweet(tweet))">
                                        <div class="mt-3 border border-[var(--border-color)] rounded-xl p-3 hover-bg transition cursor-pointer" @click.stop="openThread(getQuoteTweet(tweet).rest_id || getQuoteTweet(tweet).id_str)">
                                            <div class="flex items-center space-x-1 text-[15px] mb-1">
                                                <div class="w-5 h-5 rounded-full flex-shrink-0 relative bg-[var(--gray-700)] flex items-center justify-center font-bold text-[var(--white-icon)] uppercase text-xs overflow-hidden">
                                                    <span x-text="getQuoteAuthor(getQuoteTweet(tweet)).initial"></span>
                                                    <img :src="'/api/avatar/' + getQuoteAuthor(getQuoteTweet(tweet)).id" @error="$el.style.display='none'" class="absolute inset-0 w-full h-full object-cover z-10" loading="lazy">
                                                </div>
                                                <span class="font-bold text-[var(--text-primary)] truncate" x-text="getQuoteAuthor(getQuoteTweet(tweet)).name"></span>
                                                <span class="text-[var(--text-secondary)] truncate" x-text="'@' + getQuoteAuthor(getQuoteTweet(tweet)).screen_name"></span>
                                                <span class="text-[var(--text-secondary)]">·</span>
                                                <span class="text-[var(--text-secondary)]" x-text="formatDate(getQuoteTweet(tweet).legacy?.created_at || getQuoteTweet(tweet).created_at)"></span>
                                            </div>
                                            
                                            <template x-if="getReplyTo({raw_json: getQuoteTweet(tweet)})">
                                                <div class="text-[15px] text-[var(--text-secondary)] mb-1">
                                                    Replying to <span class="text-[#1d9bf0] hover:underline cursor-pointer" @click.stop="searchFrom(getReplyTo({raw_json: getQuoteTweet(tweet)}))" x-text="'@' + getReplyTo({raw_json: getQuoteTweet(tweet)})"></span>
                                                </div>
                                            </template>

                                            <div class="text-[15px] whitespace-pre-wrap leading-normal break-words" x-html="formatText({text: getQuoteText(getQuoteTweet(tweet)), raw_json: getQuoteTweet(tweet)})" @click="handleTextClick($event)"></div>
                                            <div x-html="renderMediaGrid(tweet.qt_media)" class="mt-2" @click.stop></div>
                                            <div x-html="renderCard({raw_json: getQuoteTweet(tweet)})" @click.stop></div>
                                            <div x-html="renderCommunityNote(getQuoteTweet(tweet), true)" @click.stop></div>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <div x-html="renderCommunityNote(tweet.raw_json)" @click.stop></div>
                            <div x-html="renderActionBar(tweet)" class="mt-1"></div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Infinite Scroll Sentinel -->
            <div x-show="!loading && page < totalPages" x-intersect="loadMore()" class="p-6 text-center text-[#1d9bf0] flex justify-center">
                <svg class="animate-spin h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>

        <!-- THREAD VIEW -->
        <div x-show="viewMode === 'thread'" x-cloak class="pb-20">
            <template x-if="loadingThread"><div class="p-8 text-center text-gray-500">Loading thread...</div></template>
            
            <template x-if="!loadingThread && threadData">
                <div>
                    <!-- PARENTS -->
                    <template x-for="(parent, index) in threadData.parents" :key="parent.tweet_id">
                        <div class="px-4 pt-3 flex relative cursor-pointer hover-bg" @click="openThread(parent.tweet_id)">
                            
                            <template x-if="index > 0">
                                <div class="w-0.5 bg-[var(--thread-line)] absolute top-0 h-[12px] left-[36px] -translate-x-1/2 z-0"></div>
                            </template>
                            
                            <div class="w-0.5 bg-[var(--thread-line)] absolute top-[52px] bottom-0 left-[36px] -translate-x-1/2 z-0"></div>
                            
                            <div class="w-10 h-10 rounded-full flex-shrink-0 relative bg-[var(--gray-700)] flex items-center justify-center font-bold text-[var(--white-icon)] uppercase overflow-hidden z-10 mr-3" @click.stop="searchFrom(parent.author.username)">
                                <span x-text="getInitial(parent)"></span>
                                <img :src="'/api/avatar/' + (parent.author.id || 'unknown')" @error="$el.style.display='none'" class="absolute inset-0 w-full h-full object-cover z-10" loading="lazy">
                            </div>

                            <div class="flex-1 min-w-0 pb-2 z-10">
                                <div class="flex items-center space-x-1 text-[15px]">
                                    <span class="font-bold text-[var(--text-primary)] truncate hover:underline" @click.stop="searchFrom(parent.author.username)" x-text="parent.author.display_name || 'Unknown'"></span>
                                    <span class="text-[var(--text-secondary)] truncate" x-text="'@' + (parent.author.username || 'unknown')"></span>
                                    <span class="text-[var(--text-secondary)]">·</span>
                                    <div class="roll-wrapper text-[var(--text-secondary)]" @click.stop>
                                        <div class="roll-inner">
                                            <span class="roll-item hover:underline" x-text="formatDate(parent.created_at)"></span>
                                            <span class="roll-item text-[#1d9bf0] text-[13px] font-medium" x-text="formatSyncDate(parent)"></span>
                                        </div>
                                    </div>
                                </div>
                                
                                <template x-if="getReplyTo(parent)">
                                    <div class="text-[15px] text-[var(--text-secondary)] mb-1">
                                        Replying to <span class="text-[#1d9bf0] hover:underline cursor-pointer" @click.stop="searchFrom(getReplyTo(parent))" x-text="'@' + getReplyTo(parent)"></span>
                                    </div>
                                </template>

                                <div class="text-[15px] mt-1 whitespace-pre-wrap leading-normal break-words" x-html="formatText(parent)" @click="handleTextClick($event)"></div>
                                <div x-html="renderMediaGrid(parent.media)" class="mt-3" @click.stop></div>
                                <div x-html="renderCommunityNote(parent.raw_json)" @click.stop></div>
                                <div x-html="renderActionBar(parent)" class="mt-2"></div>
                            </div>
                        </div>
                    </template>

                    <!-- MAIN TWEET -->
                    <div class="px-4 pt-3 pb-2 tweet-border relative">
                        <template x-if="threadData.parents.length > 0">
                            <div class="absolute w-0.5 bg-[var(--thread-line)] top-0 h-[12px] left-[36px] -translate-x-1/2 z-0"></div>
                        </template>

                        <div class="flex space-x-3 mb-3 relative z-10">
                            <div class="w-10 h-10 rounded-full flex-shrink-0 relative bg-[var(--gray-700)] flex items-center justify-center font-bold text-[var(--white-icon)] uppercase overflow-hidden cursor-pointer" @click.stop="searchFrom(threadData.main.author.username)">
                                <span x-text="getInitial(threadData.main)"></span>
                                <img :src="'/api/avatar/' + (threadData.main.author.id || 'unknown')" @error="$el.style.display='none'" class="absolute inset-0 w-full h-full object-cover z-10" loading="lazy">
                            </div>

                            <div class="cursor-pointer flex-1" @click.stop="searchFrom(threadData.main.author.username)">
                                <div class="font-bold text-[var(--text-primary)] hover:underline" x-text="threadData.main.author.display_name || 'Unknown'"></div>
                                <div class="text-[var(--text-secondary)]" x-text="'@' + (threadData.main.author.username || 'unknown')"></div>
                            </div>
                        </div>
                        
                        <template x-if="getReplyTo(threadData.main) && threadData.parents.length === 0">
                            <div class="text-[15px] text-[var(--text-secondary)] mb-2">
                                Replying to <span class="text-[#1d9bf0] hover:underline cursor-pointer" @click.stop="searchFrom(getReplyTo(threadData.main))" x-text="'@' + getReplyTo(threadData.main)"></span>
                            </div>
                        </template>

                        <div class="text-[17px] whitespace-pre-wrap leading-normal break-words" x-html="formatText(threadData.main)" @click="handleTextClick($event)"></div>

                                            <span class="font-bold text-[var(--text-primary)] truncate" x-text="getQuoteAuthor(getQuoteTweet(threadData.main)).name"></span>
                                            <span class="text-[var(--text-secondary)] truncate" x-text="'@' + getQuoteAuthor(getQuoteTweet(threadData.main)).screen_name"></span>
                                            <span class="text-[var(--text-secondary)]">·</span>
                                            <span class="text-[var(--text-secondary)]" x-text="formatDate(getQuoteTweet(threadData.main).legacy?.created_at || getQuoteTweet(threadData.main).created_at)"></span>
                                        </div>
                                        
                                        <template x-if="getReplyTo({raw_json: getQuoteTweet(threadData.main)})">

                                        </template>

                                        <div class="text-[15px] whitespace-pre-wrap leading-normal break-words" x-html="formatText({text: getQuoteText(getQuoteTweet(threadData.main)), raw_json: getQuoteTweet(threadData.main)})" @click="handleTextClick($event)"></div>
                                        <div x-html="renderCard({raw_json: getQuoteTweet(threadData.main)})" @click.stop></div>
                                        <div x-html="renderMediaGrid(threadData.main.qt_media)" class="mt-2" @click.stop></div>
                                        <div x-html="renderCommunityNote(getQuoteTweet(threadData.main), true)" @click.stop></div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <div class="mt-4 text-[var(--text-secondary)] border-b border-[var(--border-color)] pb-4 flex items-center justify-between">
                            <div class="roll-wrapper cursor-default">
                                <div class="roll-inner">
                                    <span class="roll-item" x-text="formatDate(threadData.main.created_at, true)"></span>
                                    <span class="roll-item text-[#1d9bf0] font-medium" x-text="formatSyncDate(threadData.main)"></span>
                                </div>
                            </div>
                            <template x-if="threadData.main.local_quote_count > 0">
                                <button @click="openQuotes(threadData.main.tweet_id)" class="text-[#1d9bf0] hover:underline text-[15px] font-medium transition ml-auto">
                                    Browse <span x-text="threadData.main.local_quote_count"></span> Quote Tweets
                                </button>
                            </template>
                        </div>
                        
                        <div x-html="renderCommunityNote(threadData.main.raw_json)" @click.stop></div>
                        <div x-html="renderActionBar(threadData.main, true)" class="mt-1 pb-3"></div>
                    </div>

                    <!-- CHILDREN / REPLIES -->
                    <template x-for="child in threadData.children" :key="child.tweet_id">
                        <div class="tweet-border">
                            <!-- Direct Reply Card -->
                            <div class="p-4 flex space-x-3 relative cursor-pointer hover-bg" @click="openThread(child.tweet_id)">
                                <!-- Connecting Line down to OP Reply (only if op_replies exists) -->
                                <template x-if="child.op_replies && child.op_replies.length > 0">

                                </template>

                                    <span x-text="getInitial(child)"></span>
                                    <img :src="'/api/avatar/' + (child.author.id || 'unknown')" @error="$el.style.display='none'" class="absolute inset-0 w-full h-full object-cover z-10" loading="lazy">
                                </div>

                                <div class="flex-1 min-w-0 z-10">
                                    <div class="flex items-center space-x-1 text-[15px]">

                                        <span class="text-[var(--text-secondary)] truncate" x-text="'@' + (child.author.username || 'unknown')"></span>
                                        <span class="text-[var(--text-secondary)]">·</span>
                                        <div class="roll-wrapper text-[#71767b]" @click.stop>
                                            <div class="roll-inner">
                                                <span class="roll-item hover:underline" x-text="formatDate(child.created_at)"></span>
                                                <span class="roll-item text-[#1d9bf0] text-[13px] font-medium" x-text="formatSyncDate(child)"></span>
                                            </div>
                                        </div>
                                    </div>

                                    <template x-if="getReplyTo(child) && getReplyTo(child) !== (threadData.main.author.username)">
                                        <div class="text-[15px] text-[#71767b] mb-1">
                                            Replying to <span class="text-[#1d9bf0] hover:underline cursor-pointer" @click.stop="searchFrom(getReplyTo(child))" x-text="'@' + getReplyTo(child)"></span>
                                        </div>
                                    </template>

                                    <div class="text-[15px] mt-1 whitespace-pre-wrap leading-normal break-words" x-html="formatText(child)" @click="handleTextClick($event)"></div>
                                    <div x-html="renderCard(child)" @click.stop></div>
                                    <div x-html="renderMediaGrid(child.media)" class="mt-3" @click.stop></div>
                                    <div x-html="renderCommunityNote(child.raw_json)" @click.stop></div>

                                        <div class="p-4 pt-0 flex space-x-3 relative cursor-pointer hover-bg" @click="openThread(reply.tweet_id)">

                                            <div class="w-0.5 bg-[#333639] absolute top-0 h-[16px] left-[36px] -translate-x-1/2 z-0"></div>

                                            </template>

                                                <span x-text="getInitial(reply)"></span>

        <!-- Lightbox Modal -->

             x-cloak 
             @click="lightboxOpen = false">
             
            <button x-show="lightboxMedia.length > 1 && lightboxIndex > 0" @click.stop="prevLightbox()" class="absolute left-4 p-3 text-white hover:bg-gray-800 rounded-full transition z-50">
                <svg viewBox="0 0 24 24" class="w-8 h-8 fill-current"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"></path></svg>
            </button>
            <button x-show="lightboxMedia.length > 1 && lightboxIndex < lightboxMedia.length - 1" @click.stop="nextLightbox()" class="absolute right-4 p-3 text-white hover:bg-gray-800 rounded-full transition z-50">
                <svg viewBox="0 0 24 24" class="w-8 h-8 fill-current"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"></path></svg>
            </button>

            <button class="absolute top-4 left-4 p-2 text-white hover:bg-gray-800 rounded-full transition z-50">
                <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M13.414 12l5.793-5.793c.39-.39.39-1.023 0-1.414s-1.024-.39-1.414 0L12 10.586 6.207 4.793c-.39-.39-1.023-.39-1.414 0s-.39 1.024 0 1.414L10.586 12l-5.793 5.793c-.39.39-.39 1.023 0 1.414.195.195.45.293.707.293s.512-.098.707-.293L12 13.414l5.793 5.793c.195.195.45.293.707.293s.512-.098.707-.293c.39-.39.39-1.023 0-1.414L13.414 12z"></path></svg>
            </button>
            
            <template x-if="lightboxMedia[lightboxIndex]">

                    <template x-if="lightboxMedia[lightboxIndex].type === 'photo'">

                    </template>
                    <template x-if="lightboxMedia[lightboxIndex].type === 'video'">
                        <template x-if="lightboxMedia[lightboxIndex].isGif">
                            <video :src="lightboxMedia[lightboxIndex].src" autoplay loop muted playsinline class="max-w-[90%] max-h-[90%] outline-none" @click.stop></video>
                        </template>
                        <template x-if="!lightboxMedia[lightboxIndex].isGif">
                            <video :src="lightboxMedia[lightboxIndex].src" controls autoplay class="max-w-[90%] max-h-[90%] outline-none" @click.stop></video>
                        </template>
                    </template>
                </div>
            </template>
        </div>

        <!-- AI Tag Modal -->
        <div x-show="tagModalOpen" 
             @keydown.window.escape="closeTagModal()" 
             class="fixed inset-0 z-[100] bg-black/60 flex items-center justify-center p-4" 
             x-cloak 
             @click="closeTagModal()">
            <div class="bg-[var(--bg-primary)] border border-[var(--border-color)] rounded-2xl w-full max-w-md overflow-hidden flex flex-col shadow-2xl relative" @click.stop>
                
                <div class="flex items-center justify-between p-4 border-b border-[var(--border-color)]">
                    <div class="flex items-center text-[var(--text-primary)] font-bold text-lg">
                        <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current mr-2 text-[#1d9bf0]"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-1-11v6h2v-6h-2zm0-4v2h2V7h-2z"></path></svg>
                        AI Media Tags
                    </div>
                    <button @click="closeTagModal()" class="text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-secondary)] p-2 rounded-full transition">
                        <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current"><path d="M13.414 12l5.793-5.793c.39-.39.39-1.023 0-1.414s-1.024-.39-1.414 0L12 10.586 6.207 4.793c-.39-.39-1.023-.39-1.414 0s-.39 1.024 0 1.414L10.586 12l-5.793 5.793c-.39.39-.39 1.023 0 1.414.195.195.45.293.707.293s.512-.098.707-.293L12 13.414l5.793 5.793c.195.195.45.293.707.293s.512-.098.707-.293c.39-.39.39-1.023 0-1.414L13.414 12z"></path></svg>
                    </button>
                </div>

                <div class="p-4 overflow-y-auto max-h-[60vh] text-[var(--text-primary)]">
                    <template x-if="tagModalData">
                        <div>

                                <div class="text-[15px] leading-relaxed" x-text="tagModalData.description"></div>

                            <div>
                                <div class="text-sm text-[var(--text-secondary)] font-bold uppercase tracking-wider mb-2">Tags</div>
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="tag in tagModalData.tags" :key="tag">
                                        <div @click="closeTagModal(); searchQuery='tag:' + tag; search()" class="px-3 py-1 bg-[#1d9bf0]/10 text-[#1d9bf0] text-sm rounded-full font-medium cursor-pointer hover:bg-[#1d9bf0]/20 transition" x-text="tag"></div>
                                    </template>
                                </div>

                    </template>

                <div class="p-4 border-t border-[var(--border-color)] bg-[var(--bg-secondary)] flex justify-end">

                </div>
            </div>
